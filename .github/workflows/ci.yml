name: CI

on:
  pull_request:
    paths:
      - .github/workflows/ci.yml
      - src/agent_permission_diff_bot/**
      - tests/**
      - pyproject.toml
      - uv.lock
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - src/agent_permission_diff_bot/**
      - tests/**
      - pyproject.toml
      - uv.lock
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        shell: bash
        run: python -m pip install uv

      - name: Check formatting
        shell: bash
        run: uv run --python "${{ matrix.python-version }}" ruff format --check .

      - name: Lint
        shell: bash
        run: uv run --python "${{ matrix.python-version }}" ruff check .

      - name: Test
        shell: bash
        run: uv run --python "${{ matrix.python-version }}" pytest

      - name: Build
        shell: bash
        run: uv build
