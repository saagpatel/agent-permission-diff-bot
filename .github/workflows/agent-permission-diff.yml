name: Agent Permission Diff

on:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: agent-permission-diff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  permission-diff:
    name: Agent-facing permission diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan agent-facing permission changes
        uses: saagpatel/agent-permission-diff-bot@v0.4.0
        with:
          mode: observe
          fail-on: critical
          json: agent-permission-diff.json
          sarif: agent-permission-diff.sarif
          markdown: agent-permission-diff.md
          step-summary: "true"
          comment: "true"
          upload-sarif: "false"
